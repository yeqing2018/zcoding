<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 数字方块</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </header>
        
        <div class="game-controls">
            <p class="game-intro">使用 <strong>方向键</strong> 或 <strong>滑动屏幕</strong> 移动方块</p>
            <button class="btn-new-game" id="new-game-btn">新游戏</button>
        </div>
        
        <div class="game-board" id="game-board">
            <div class="grid-container" id="grid-container"></div>
            <div class="tile-container" id="tile-container"></div>
            
            <div class="game-message" id="game-message">
                <div class="message-content">
                    <h2 id="message-title">游戏结束</h2>
                    <button class="btn-continue" id="continue-btn">继续游戏</button>
                    <button class="btn-retry" id="retry-btn">再来一局</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
