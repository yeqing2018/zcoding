<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <h1>俄罗斯方块</h1>
            <div class="info-panel">
                <div class="info-item">
                    <span class="label">分数</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="info-item">
                    <span class="label">等级</span>
                    <span class="value" id="level">1</span>
                </div>
                <div class="info-item">
                    <span class="label">消除行数</span>
                    <span class="value" id="lines">0</span>
                </div>
            </div>
            <div class="controls-info">
                <h3>操作说明</h3>
                <div class="control-item">← 向左移动</div>
                <div class="control-item">→ 向右移动</div>
                <div class="control-item">↓ 加速下落</div>
                <div class="control-item">↑ 旋转</div>
                <div class="control-item">空格 暂停/继续</div>
            </div>
        </div>
        <div class="game-board-wrapper">
            <canvas id="game-board" width="300" height="600"></canvas>
            <div class="game-overlay" id="game-overlay">
                <div class="overlay-content">
                    <div id="game-status" class="status-message">按空格键开始游戏</div>
                    <button id="start-btn" class="game-btn">开始游戏</button>
                </div>
            </div>
            <div class="effect-layer" id="effect-layer"></div>
        </div>
        <div class="next-piece">
            <h3>下一个</h3>
            <canvas id="next-piece" width="120" height="120"></canvas>
        </div>
    </div>
    <script src="../js/game.js"></script>
</body>
</html>
