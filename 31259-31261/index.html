<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能计时器 Pro - 多组倒计时并行</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-blue">
  <div class="flash-overlay" id="flashOverlay"></div>

  <div class="app-container">
    <div class="app-wrapper glass-effect">
      <!-- 头部导航 -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <span class="logo-text">智能计时器 Pro</span>
        </div>

        <nav class="nav-tabs">
          <button class="nav-tab active" data-view="timers">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            计时器
          </button>
          <button class="nav-tab" data-view="statistics">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            统计
          </button>
          <button class="nav-tab" data-view="settings">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            设置
          </button>
          <button class="nav-tab" data-view="embed">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            嵌入
          </button>
        </nav>

        <div class="header-actions">
          <button class="action-btn" id="soundToggle" title="音效开关">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <button class="action-btn" id="fullscreenToggle" title="全屏模式">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- 主内容区 -->
      <main class="main-content">
        <!-- 计时器视图 -->
        <div class="view" id="view-timers">
          <div class="timer-tabs" id="timerTabs">
          </div>
          <div class="timers-grid" id="timersGrid">
          </div>
        </div>

        <!-- 统计视图 -->
        <div class="view" id="view-statistics" style="display: none;">
          <div class="stats-container">
            <div class="stats-summary" id="statsSummary">
            </div>
            <div class="chart-container">
              <div class="chart-title">每日计时时长（分钟）</div>
              <canvas class="chart-canvas" id="statsChart"></canvas>
            </div>
            <div class="stats-table-container">
              <table class="stats-table">
                <thead>
                  <tr>
                    <th>名称</th>
                    <th>模式</th>
                    <th>时长</th>
                    <th>状态</th>
                    <th>结束时间</th>
                  </tr>
                </thead>
                <tbody id="statsTableBody">
                </tbody>
              </table>
              <div class="stats-actions">
                <button class="btn btn-secondary" id="exportJsonBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  导出 JSON
                </button>
                <button class="btn btn-primary" id="exportCsvBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  导出 CSV
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 设置视图 -->
        <div class="view" id="view-settings" style="display: none;">
          <div class="settings-container">
            <div class="settings-card">
              <div class="settings-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                外观设置
              </div>
              <div class="settings-grid">
                <div class="setting-item">
                  <label class="setting-label">主题颜色</label>
                  <div class="theme-selector" id="themeSelector">
                    <div class="theme-option blue active" data-theme="blue" title="深邃蓝"></div>
                    <div class="theme-option orange" data-theme="orange" title="活力橙"></div>
                    <div class="theme-option purple" data-theme="purple" title="神秘紫"></div>
                    <div class="theme-option green" data-theme="green" title="清新绿"></div>
                    <div class="theme-option pink" data-theme="pink" title="樱花粉"></div>
                    <div class="theme-option gray" data-theme="gray" title="极简灰"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">字体大小</label>
                  <div class="setting-control">
                    <input type="range" id="globalFontSize" min="0.8" max="1.5" step="0.1" value="1">
                    <span class="setting-value" id="fontSizeValue">100%</span>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">毛玻璃效果</label>
                  <div class="setting-control">
                    <div class="toggle-switch active" id="glassEffectToggle"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">自定义背景</label>
                  <div class="setting-control">
                    <input type="file" id="bgImageInput" accept="image/*" style="display: none;">
                    <button class="btn btn-secondary" id="bgImageBtn">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                      </svg>
                      选择图片
                    </button>
                    <button class="btn btn-secondary" id="bgClearBtn" style="display: none;">清除</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="settings-card">
              <div class="settings-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                提醒设置
              </div>
              <div class="settings-grid">
                <div class="setting-item">
                  <label class="setting-label">音效提醒</label>
                  <div class="setting-control">
                    <div class="toggle-switch active" id="soundReminderToggle"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">视觉提醒</label>
                  <div class="setting-control">
                    <div class="toggle-switch active" id="visualReminderToggle"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">浏览器通知</label>
                  <div class="setting-control">
                    <div class="toggle-switch" id="notificationToggle"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">语音播报</label>
                  <div class="setting-control">
                    <div class="toggle-switch" id="speechToggle"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">设备震动</label>
                  <div class="setting-control">
                    <div class="toggle-switch" id="vibrationToggle"></div>
                  </div>
                </div>
                <div class="setting-item">
                  <label class="setting-label">标题闪烁</label>
                  <div class="setting-control">
                    <div class="toggle-switch active" id="titleFlashToggle"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="settings-card">
              <div class="settings-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                快捷键设置
              </div>
              <div class="hotkey-list" id="hotkeyList">
              </div>
            </div>
          </div>
        </div>

        <!-- 嵌入视图 -->
        <div class="view" id="view-embed" style="display: none;">
          <div class="settings-container">
            <div class="settings-card">
              <div class="settings-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 18 22 12 16 6"/>
                  <polyline points="8 6 2 12 8 18"/>
                </svg>
                网页嵌入代码生成器
              </div>
              <div class="settings-section">
                <div class="setting-item" style="margin-bottom: 16px;">
                  <label class="setting-label">嵌入模式</label>
                  <div class="setting-control">
                    <select id="embedMode" class="input-group" style="flex: 1; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary);">
                      <option value="single">单计时器</option>
                      <option value="multi">多计时器</option>
                    </select>
                  </div>
                </div>
                <div class="setting-item" style="margin-bottom: 16px;">
                  <label class="setting-label">iframe 宽度</label>
                  <div class="input-group">
                    <input type="number" id="embedWidth" value="400" min="200" max="1200">
                    <span class="unit">px</span>
                  </div>
                </div>
                <div class="setting-item" style="margin-bottom: 16px;">
                  <label class="setting-label">iframe 高度</label>
                  <div class="input-group">
                    <input type="number" id="embedHeight" value="500" min="300" max="1000">
                    <span class="unit">px</span>
                  </div>
                </div>
                <div class="setting-item" style="margin-bottom: 16px;">
                  <label class="setting-label">默认时长（秒）</label>
                  <div class="input-group">
                    <input type="number" id="embedDuration" value="300" min="1" max="86400">
                  </div>
                </div>
                <div class="setting-item" style="margin-bottom: 16px;">
                  <label class="setting-label">主题</label>
                  <div class="theme-selector" id="embedThemeSelector">
                    <div class="theme-option blue active" data-theme="blue"></div>
                    <div class="theme-option orange" data-theme="orange"></div>
                    <div class="theme-option purple" data-theme="purple"></div>
                    <div class="theme-option green" data-theme="green"></div>
                    <div class="theme-option pink" data-theme="pink"></div>
                    <div class="theme-option gray" data-theme="gray"></div>
                  </div>
                </div>
              </div>
              <div class="settings-section">
                <label class="setting-label">生成的代码</label>
                <textarea id="embedCode" readonly style="width: 100%; padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; resize: vertical; min-height: 120px;"></textarea>
              </div>
              <div class="settings-section" style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn btn-secondary" id="copyEmbedCode">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  复制代码
                </button>
                <button class="btn btn-primary" id="previewEmbed">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  预览
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 新建计时器模态框 -->
  <div class="modal-overlay" id="newTimerModal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">新建计时器</h3>
        <button class="modal-close" id="closeNewTimerModal">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <div class="setting-item" style="margin-bottom: 16px;">
            <label class="setting-label">计时器名称</label>
            <input type="text" id="newTimerName" placeholder="例如：番茄钟、会议计时..." style="width: 100%; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary);">
          </div>
          <div class="setting-item" style="margin-bottom: 16px;">
            <label class="setting-label">计时模式</label>
            <div class="setting-control">
              <select id="newTimerMode" style="flex: 1; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary);">
                <option value="countdown">倒计时</option>
                <option value="countup">正计时</option>
              </select>
            </div>
          </div>
          <div class="setting-item" style="margin-bottom: 16px;">
            <label class="setting-label">时长设置</label>
            <div class="input-group">
              <input type="number" id="newTimerHours" min="0" max="23" value="0">
              <span class="unit">时</span>
              <input type="number" id="newTimerMinutes" min="0" max="59" value="5">
              <span class="unit">分</span>
              <input type="number" id="newTimerSeconds" min="0" max="59" value="0">
              <span class="unit">秒</span>
            </div>
          </div>
          <div class="setting-item" style="margin-bottom: 16px;">
            <label class="setting-label">
              <div class="setting-control">
                <div class="toggle-switch" id="newTimerLoopToggle"></div>
                <span style="color: var(--text-primary);">循环计时</span>
              </div>
            </label>
          </div>
          <div id="loopSettings" style="display: none; margin-bottom: 16px; padding: 12px; background: var(--bg-secondary); border-radius: 8px;">
            <div class="setting-item" style="margin-bottom: 12px;">
              <label class="setting-label">循环次数（0为无限循环）</label>
              <input type="number" id="newTimerLoopCount" min="0" value="0" style="width: 100%; padding: 8px 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary);">
            </div>
            <div class="setting-item">
              <label class="setting-label">循环间隔（秒）</label>
              <input type="number" id="newTimerLoopInterval" min="0" value="0" style="width: 100%; padding: 8px 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary);">
            </div>
          </div>
          <div class="setting-item" style="margin-bottom: 16px;">
            <label class="setting-label">显示毫秒</label>
            <div class="setting-control">
              <div class="toggle-switch" id="newTimerMsToggle"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelNewTimer">取消</button>
        <button class="btn btn-primary" id="confirmNewTimer">创建</button>
      </div>
    </div>
  </div>

  <!-- 嵌入预览模态框 -->
  <div class="modal-overlay" id="embedPreviewModal" style="display: none;">
    <div class="modal" style="max-width: 800px;">
      <div class="modal-header">
        <h3 class="modal-title">嵌入预览</h3>
        <button class="modal-close" id="closeEmbedPreview">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <iframe id="embedPreviewFrame" style="width: 100%; border: 1px solid var(--border-color); border-radius: 8px;"></iframe>
      </div>
    </div>
  </div>

  <!-- 脚本引入 -->
  <script src="js/utils/hotkeys.js"></script>
  <script src="js/data/storage.js"></script>
  <script src="js/data/statistics.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/notification/reminder.js"></script>
  <script src="js/core/timer.js"></script>
  <script src="js/core/timerManager.js"></script>
  <script src="js/core/scheduler.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
