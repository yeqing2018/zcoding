<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避下落方块</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="score-panel">
            <div class="score-item">
                <span class="label">当前分数</span>
                <span class="value current-score">0</span>
            </div>
            <div class="score-item difficulty">
                <span class="label">难度等级</span>
                <span class="value level-value">1</span>
            </div>
            <div class="score-item combo">
                <span class="label">连续躲避</span>
                <span class="value combo-value">0</span>
            </div>
            <div class="score-item best">
                <span class="label">最高分</span>
                <span class="value best-score">0</span>
            </div>
        </div>
        
        <div class="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="startScreen" class="overlay">
                <div class="overlay-content">
                    <h1 class="game-title">躲避下落方块</h1>
                    <div class="game-icon">🎮</div>
                    <div class="instructions">
                        <p><span class="key">← →</span> 或 <span class="key">A D</span> 移动</p>
                        <p><span class="key">ESC</span> 暂停游戏</p>
                        <p><span class="key">P</span> 暂停 / 继续</p>
                    </div>
                    <div class="highest-score-display" id="highestScoreDisplay">
                        历史最高分: <span id="highScoreValue">0</span>
                    </div>
                    <p class="start-hint">按任意键开始游戏</p>
                </div>
            </div>
            <div id="pauseScreen" class="overlay hidden">
                <div class="overlay-content">
                    <h1 class="pause-title">⏸️ 游戏暂停</h1>
                    <p class="pause-hint">按 <span class="key">ESC</span> 或 <span class="key">P</span> 继续</p>
                    <div class="pause-stats">
                        <div class="stat">当前分数: <span id="pauseScore">0</span></div>
                        <div class="stat">难度等级: <span id="pauseLevel">1</span></div>
                    </div>
                </div>
            </div>
            <div id="gameOverScreen" class="overlay hidden">
                <div class="overlay-content">
                    <h1 class="gameover-title">💥 游戏结束</h1>
                    <div class="final-result">
                        <div class="result-item">
                            <span class="result-label">最终分数</span>
                            <span class="result-value" id="finalScore">0</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">达到难度</span>
                            <span class="result-value" id="finalLevel">1</span>
                        </div>
                        <div class="result-item highlight" id="newRecord" style="display: none;">
                            🏆 新纪录！
                        </div>
                    </div>
                    <p class="start-hint">按任意键重新开始</p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
