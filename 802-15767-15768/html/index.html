<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>经典贪吃蛇</h1>
        </header>

        <div class="score-board">
            <div class="score-item">
                <span class="label">当前得分</span>
                <span class="value" id="current-score">0</span>
            </div>
            <div class="score-item">
                <span class="label">最高分</span>
                <span class="value" id="high-score">0</span>
            </div>
        </div>

        <div class="game-canvas-container">
            <canvas id="game-canvas" width="400" height="400"></canvas>
            <div id="game-overlay" class="game-overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">准备开始</h2>
                    <p id="overlay-message">点击开始按钮开始游戏</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn btn-start">开始游戏</button>
            <button id="pause-btn" class="btn btn-pause" disabled>暂停</button>
            <button id="restart-btn" class="btn btn-restart">重新开始</button>
        </div>

        <div class="instructions">
            <p><strong>操作说明：</strong></p>
            <p>使用键盘 ↑ ↓ ← → 方向键控制蛇的移动</p>
            <p>吃食物获得分数，避免撞墙和自己的身体</p>
        </div>
    </div>

    <script src="../js/game.js"></script>
</body>
</html>
