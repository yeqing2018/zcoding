<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接金币小游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-board">
                <span>分数: <span id="score">0</span></span>
            </div>
            <div class="level-board">
                关卡: <span id="level">1</span> | 目标: <span id="levelTarget">20</span>
            </div>
            <div class="combo-board" id="comboBoard">
                连击: <span id="combo">0</span>x
            </div>
            <div class="double-board" id="doubleBoard">
                双倍金币: <span id="doubleTime">0</span>s
            </div>
        </div>
        
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div id="startMenu" class="menu-panel">
            <h1>接金币小游戏</h1>
            <div class="menu-section">
                <h3>角色皮肤</h3>
                <div class="skin-selector">
                    <div class="skin-option selected" data-skin="default">
                        <div class="skin-preview skin-default"></div>
                        <span>小男孩</span>
                    </div>
                    <div class="skin-option" data-skin="girl">
                        <div class="skin-preview skin-girl"></div>
                        <span>小女孩</span>
                    </div>
                    <div class="skin-option" data-skin="robot">
                        <div class="skin-preview skin-robot"></div>
                        <span>机器人</span>
                    </div>
                    <div class="skin-option" data-skin="ninja">
                        <div class="skin-preview skin-ninja"></div>
                        <span>忍者</span>
                    </div>
                </div>
            </div>
            <div class="menu-section">
                <h3>金币速度</h3>
                <div class="speed-selector">
                    <button class="speed-btn selected" data-speed="2">慢速</button>
                    <button class="speed-btn" data-speed="3">正常</button>
                    <button class="speed-btn" data-speed="5">快速</button>
                    <button class="speed-btn" data-speed="7">极速</button>
                </div>
            </div>
            <div class="player-name-section">
                <input type="text" id="playerName" placeholder="输入你的名字" maxlength="10">
            </div>
            <div class="menu-buttons">
                <button id="startBtn" class="primary-btn">开始游戏</button>
                <button id="leaderboardBtn" class="secondary-btn">排行榜</button>
            </div>
        </div>
        
        <div id="gameOver" class="menu-panel">
            <h2>游戏结束</h2>
            <p class="final-score">最终分数: <span id="finalScore">0</span></p>
            <p class="final-level">最终关卡: <span id="finalLevel">1</span></p>
            <p class="max-combo">最高连击: <span id="maxCombo">0</span>x</p>
            <div class="menu-buttons">
                <button id="restartBtn" class="primary-btn">再来一局</button>
                <button id="menuBtn" class="secondary-btn">返回菜单</button>
            </div>
        </div>
        
        <div id="levelUp" class="menu-panel level-up-panel">
            <h2>恭喜过关！</h2>
            <p class="level-info">进入关卡 <span id="nextLevel">2</span></p>
            <p class="level-target">下一关目标: <span id="nextLevelTarget">50</span> 分</p>
            <button id="continueBtn" class="primary-btn">继续</button>
        </div>
        
        <div id="leaderboardPanel" class="menu-panel">
            <h2>排行榜</h2>
            <div id="leaderboardList" class="leaderboard-list"></div>
            <button id="closeLeaderboard" class="secondary-btn">关闭</button>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
