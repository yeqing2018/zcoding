<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋双人对战</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>井字棋双人对战</h1>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">X胜场</span>
                <span class="stat-value" id="xWins">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">平局</span>
                <span class="stat-value" id="draws">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">O胜场</span>
                <span class="stat-value" id="oWins">0</span>
            </div>
        </div>
        
        <div class="timer" id="timer">用时: 00:00</div>
        
        <div class="game-info">
            <div class="status" id="status">玩家 X 的回合</div>
        </div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <button class="reset-btn" id="resetBtn">重新开始</button>
    </div>
    
    <script src="js/game.js"></script>
</body>
</html>
